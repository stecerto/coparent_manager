{# Widget specifico per Consulenti #}
{% if consultant_assignments %}
<div class="card shadow-sm border-0 mb-4 border-start border-4 border-info">
    <div class="card-header bg-info bg-opacity-10 text-info">
        <h6 class="mb-0 fw-bold">💼 Incarichi di Consulenza Attivi</h6>
    </div>
    <div class="card-body p-3">
        <ul class="list-group list-group-flush">
            {% for assignment in consultant_assignments %}
                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                    <div>
                        <div class="fw-bold">{{ assignment.family.name }}</div>
                        <small class="text-muted">{{ assignment.get_assignment_type_display }}</small>
                    </div>
                    <span class="badge bg-info text-dark">
                        Attivo
                    </span>
                </li>
            {% endfor %}
        </ul>
        <div class="mt-3 text-center">
            <a href="#" class="btn btn-sm btn-outline-info w-100">Gestisci incarichi</a>
        </div>
    </div>
</div>
{% endif %}
