{# Widget specifico per Mediatori #}
{% if mediator_agreements %}
<div class="card shadow-sm border-0 mb-4 border-start border-4 border-success">
    <div class="card-header bg-success bg-opacity-10 text-success">
        <h6 class="mb-0 fw-bold">🤝 Mediazioni in Corso</h6>
    </div>
    <div class="card-body p-3">
        <ul class="list-group list-group-flush">
            {% for agreement in mediator_agreements %}
                <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                    <div>
                        <div class="fw-bold">{{ agreement.title }}</div>
                        <small class="text-muted">{{ agreement.family.name }}</small>
                    </div>
                    <span class="badge bg-warning text-dark">
                        {{ agreement.get_status_display }}
                    </span>
                </li>
            {% endfor %}
        </ul>
        <div class="mt-3 text-center">
            <a href="#" class="btn btn-sm btn-outline-success w-100">Gestisci tutte le mediazioni</a>
        </div>
    </div>
</div>
{% endif %}
