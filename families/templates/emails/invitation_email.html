<h2>{{ invitation_title }}</h2>

<p>{{ invitation_message }}</p>

{% if subject_name %}
<p><strong>{{ subject_name }}</strong></p>
{% endif %}

<p>Invitato da: {{ inviter_name }}</p>

<div style="margin-top:20px; margin-bottom:20px;">
        <a href="{{ invite_link }}"
           style="
              background:#0d6efd;
              color:#FFFFFF;
              padding:14px 28px;
              border-radius:8px;
              text-decoration:none;
              font-size:16px;
              font-weight:600;
              display:inline-block;
           ">
           Accetta l'invito
        </a>
</div>
<p style="font-size:12px; color:#666;">
        Se il pulsante non funziona, copia e incolla questo link:
        <br>
        {{ invite_link }}
    </p>
