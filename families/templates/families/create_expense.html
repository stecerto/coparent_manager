<h3>Nuova Spesa</h3>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="description" placeholder="Descrizione"><br>

    <select name="category">
        <option value="medical">Medica</option>
        <option value="school">Scolastica</option>
        <option value="extra">Straordinaria</option>
    </select><br>

    <input type="number" step="0.01" name="amount"><br>
    <input type="date" name="date"><br>

    <label>Documenti</label>
    <input type="file" name="documents" multiple><br>

    <button type="submit">Salva</button>
</form>
