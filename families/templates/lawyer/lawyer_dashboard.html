


<h1>⚖️ Dashboard Avvocato</h1>

<h3>📄 Documenti rilevanti</h3>

<ul>
    {% for doc in documents %}
        <li>
            {{ doc.title }}
            <a href="{% url 'documents:detail' doc.id %}">
                apri
            </a>
        </li>
    {% endfor %}
</ul>

<hr>

<h3>📜 Attività recenti</h3>

<ul>
    {% for log in logs %}
        <li>
            {{ log.created_at }} - {{ log.description }}
        </li>
    {% endfor %}
</ul>
