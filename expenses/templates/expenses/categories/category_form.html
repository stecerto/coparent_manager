{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card shadow p-4">

        <h2>
            {% if category %}
                Modifica Categoria
            {% else %}
                Nuova Categoria
            {% endif %}
        </h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-success">
                Salva
            </button>

        </form>

    </div>

</div>

{% endblock %}
