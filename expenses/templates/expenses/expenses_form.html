{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}{{ title }}{% endblock title %}

{%block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
             <h2>{{ title }}</h2>
             <div class="card p-3 shadow custom-card h-100">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success btn-style">Salva</button>
                </form>
                <hr style="border: 1px solid #ccc; width: 50%; margin: 20px auto;">
                <a href="{% url 'expenses:expenses_dashboard' %}">← Torna alla dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
{% block scripts %}
<script src="{% static 'js/coparentmanager.js' %}"></script>
{% endblock scripts%}
