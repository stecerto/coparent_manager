<div style="max-width:600px; margin:auto; padding:20px; font-family:Arial, sans-serif;">
    <h2>Invito come avvocato</h2>

    <p>Sei stato indicato come avvocato di:</p>

    <strong>
        {{ assistito_nome }} {{ assistito_cognome }}
    </strong>
    <p>da parte di {{ user.username }}</p>


    <p>Clicca qui per accettare l'invito:</p>

    <div style="margin-top:20px; margin-bottom:20px;">
        <a href="{{ invite_link }}"
           style="
              background:#0d6efd;
              color:#FFFFFF;
              padding:14px 28px;
              border-radius:8px;
              text-decoration:none;
              font-size:16px;
              font-weight:600;
              display:inline-block;
           ">
           Accetta l'invito
        </a>
    </div>

    <p style="font-size:12px; color:#666;">
        Se il pulsante non funziona, copia e incolla questo link nel browser:
        <br>
        {{ invite_link }}
    </p>
</div>
