{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Bilance Family{% endblock title %}

{%block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>Login</h2>
            <div class="card p-4 shadow custom-card">
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button class="btn btn-success btn-style" type="submit">Login</button>
                </form>
                <hr style="border: 1px solid #ccc; width: 50%; margin: 20px auto;">
                <a href="/accounts/register/">Registrati</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_js %}
<script src="{% static 'js/pages/login.js' %}"></script>
{% endblock %}
