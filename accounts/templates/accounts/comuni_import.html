{% extends "base.html" %}

{% block title %}Importa Comuni - Admin{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-upload me-2"></i>Importa Comuni da JSON
                    </h5>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Seleziona file JSON</label>
                            <input type="file" name="json_file" class="form-control" accept=".json" required>
                            <small class="text-muted">
                                Il file deve contenere una lista di oggetti con: 
                                <code>nome</code>, <code>codice_catastale</code>, <code>provincia</code>
                            </small>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'accounts:comuni_admin' %}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-1"></i> Annulla
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-upload me-1"></i> Importa
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
